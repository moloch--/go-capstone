name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ github.ref_name }}
  CAPSTONE_WASM_VERSION: v6.0.0-Alpha7

jobs:
  build-cli:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: 386
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: mips
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: mips64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: mips64le
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: mipsle
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: ppc64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: ppc64le
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: riscv64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: linux
            goarch: s390x
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: darwin
            goarch: amd64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: darwin
            goarch: arm64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: freebsd
            goarch: amd64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: freebsd
            goarch: arm64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: openbsd
            goarch: amd64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: openbsd
            goarch: arm64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: netbsd
            goarch: amd64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: netbsd
            goarch: arm64
            cgo_enabled: "0"
          - runner: macos-latest
            goos: ios
            goarch: arm64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: android
            goarch: arm64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: dragonfly
            goarch: amd64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: plan9
            goarch: amd64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: solaris
            goarch: amd64
            cgo_enabled: "0"
          - runner: ubuntu-latest
            goos: windows
            goarch: 386
            cgo_enabled: "0"
            extension: .exe
          - runner: ubuntu-latest
            goos: windows
            goarch: amd64
            cgo_enabled: "0"
            extension: .exe
          - runner: ubuntu-latest
            goos: windows
            goarch: arm64
            cgo_enabled: "0"
            extension: .exe

    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Embedded Capstone Wasm
        run: make CAPSTONE_WASM_VERSION=${CAPSTONE_WASM_VERSION} wasm

      - name: Build CLI
        env:
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXTENSION: ${{ matrix.extension }}
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -o dist/go-capstone_${GOOS}-${GOARCH}${EXTENSION} \
            ./cli

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/go-capstone_${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}
          if-no-files-found: error
          retention-days: 5

  tagged-release:
    name: Tagged Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-cli
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Collect Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: build-*
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${RELEASE_VERSION}" >/dev/null 2>&1; then
            gh release create "${RELEASE_VERSION}" \
              --title "${RELEASE_VERSION}" \
              --generate-notes
          fi

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_VERSION}" release/* --clobber
